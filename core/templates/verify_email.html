{% extends "base.html" %}

{% block title %}Verify — Lamarca{% endblock %}

{% block content %}
<main class="auth-page">
  <div class="auth-card">
    <div class="auth-stamp caveat">check your mail</div>
    <h1 class="fraunces">Six digits.</h1>
    <p class="auth-sub">We sent a code to your email. It expires in five minutes.</p>

    <form method="POST" class="auth-form" id="otp-form" novalidate>
      {% csrf_token %}
      <div class="otp-row" id="otp-row">
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
      </div>
      <input type="hidden" name="code" id="code-combined" />
      <button type="submit" class="btn-primary btn-block" style="margin-top:14px;">Verify →</button>
    </form>

    <p class="auth-alt">Didn't arrive? <a href="{% url 'resend_code' %}">Resend code</a></p>
  </div>

  <div class="auth-side">
    <div class="postmark">
      <div class="pm-stamp">
        <div class="pm-stamp-inner caveat">LM</div>
        <div class="pm-stamp-price mono">v.0.4.1</div>
      </div>
      <div class="pm-lines">
        <div class="pm-line"></div>
        <div class="pm-line"></div>
        <div class="pm-line short"></div>
      </div>
      <div class="pm-ring"></div>
      <div class="pm-note caveat">one code.<br/>five minutes.<br/>good luck ✦</div>
    </div>
  </div>
</main>

<script>
  var boxes = document.querySelectorAll('.otp-box');
  var combined = document.getElementById('code-combined');
  var form = document.getElementById('otp-form');

  function sync() {
    combined.value = Array.from(boxes).map(function(b){ return b.value; }).join('');
  }

  boxes.forEach(function(box, i) {
    box.addEventListener('input', function() {
      box.value = box.value.replace(/\D/g, '').slice(0, 1);
      if (box.value) box.classList.add('on'); else box.classList.remove('on');
      if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
      sync();
      if (Array.from(boxes).every(function(b){ return b.value; })) form.submit();
    });

    box.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !box.value && i > 0) boxes[i - 1].focus();
      if (e.key === 'ArrowLeft' && i > 0) boxes[i - 1].focus();
      if (e.key === 'ArrowRight' && i < boxes.length - 1) boxes[i + 1].focus();
    });

    box.addEventListener('paste', function(e) {
      var d = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
      if (d.length > 1) {
        e.preventDefault();
        d.split('').forEach(function(ch, j) {
          if (boxes[j]) { boxes[j].value = ch; boxes[j].classList.add('on'); }
        });
        boxes[Math.min(d.length, boxes.length) - 1].focus();
        sync();
        if (d.length === 6) form.submit();
      }
    });
  });

  boxes[0].focus();

  // If the server returned errors, mark boxes red
  {% if messages %}
  boxes.forEach(function(b){ b.classList.add('err'); });
  {% endif %}
</script>
{% endblock %}
