{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-slate-50 flex flex-col">

  <!-- NAV -->
  <nav class="w-full border-b border-slate-200 bg-white/80 backdrop-blur-md">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="{% url 'home' %}" class="text-xl font-bold tracking-tight text-slate-900">Lamarca</a>
      <a href="{% url 'login' %}" class="text-sm font-medium text-violet-600 hover:text-violet-700 transition">Sign in</a>
    </div>
  </nav>

  <!-- CARD -->
  <div class="flex-1 flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md">

      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-violet-100 mb-4">
          <svg class="w-6 h-6 text-violet-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-900">Create your account</h1>
        <p class="text-slate-500 text-sm mt-1">Join Lamarca and start generating blogs</p>
      </div>

      <!-- ALERTS -->
      {% if messages %}
        {% for message in messages %}
          <div class="mb-4 px-4 py-3 rounded-xl text-sm font-medium
            {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
            {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <div class="bg-white rounded-2xl shadow-lg shadow-slate-200/60 border border-slate-100 p-8">
        <form method="POST" novalidate>
          {% csrf_token %}

          <div class="space-y-5">
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email address</label>
              <input type="email" name="email" value="{{ request.POST.email }}" required
                placeholder="you@example.com"
                class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-900 placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition"/>
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
              <input type="password" name="password" required
                placeholder="At least 8 characters"
                class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-900 placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition"/>
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5">Confirm password</label>
              <input type="password" name="confirm_password" required
                placeholder="Repeat your password"
                class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-900 placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition"/>
            </div>
          </div>

          <button type="submit"
            class="mt-6 w-full py-3.5 bg-violet-600 hover:bg-violet-700 active:scale-95 text-white text-sm font-semibold rounded-xl transition-all duration-150 shadow-sm shadow-violet-200 cursor-pointer">
            Create account
          </button>
        </form>

        <p class="text-center text-sm text-slate-500 mt-5">
          Already have an account?
          <a href="{% url 'login' %}" class="text-violet-600 font-semibold hover:underline">Sign in</a>
        </p>
      </div>

    </div>
  </div>
</div>
{% endblock %}
